<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dispatch · PAJ GPS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link href="//fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0b0b14; color: #eaeef2; padding: 0; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        :root { --accent: #f7c948; --card: #16161f; --card2: #1e1e2a; --border: #2a2a3a; --text: #eaeef2; --muted: #9aa0b0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0b14; }
        ::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 6px; }

        header { background: #0f0f18; padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
        .logo img { height: 32px; filter: drop-shadow(0 0 6px var(--accent)); cursor: pointer; }
        .badge { background: var(--accent); color: #0b0b14; padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 700; }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .header-actions button { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 30px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .header-actions button:hover { background: #2a2a3e; border-color: var(--accent); }

        .app-grid { display: flex; flex-direction: column; gap: 16px; padding: 16px; max-width: 1600px; margin: 0 auto; width: 100%; flex: 1; }
        .map-wrapper { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; height: 380px; min-height: 280px; }
        #dispatch-map { width: 100%; height: 100%; }
        .driver-badge-container { position: absolute; top: 12px; left: 12px; display: flex; flex-wrap: wrap; gap: 8px; z-index: 10; pointer-events: none; }
        .driver-badge { pointer-events: auto; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 6px 14px 6px 10px; border-radius: 40px; border-left: 4px solid; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .driver-badge:hover { background: rgba(30,30,50,0.9); transform: scale(1.02); }
        .driver-badge .dot { width: 10px; height: 10px; border-radius: 10px; display: inline-block; }
        .driver-badge .last-update { font-size: 10px; font-weight: 400; color: var(--muted); margin-left: 4px; }

        .manifest-panel { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 16px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
        .panel-header h2 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .day-toggle { display: flex; gap: 6px; background: var(--card2); border-radius: 40px; padding: 4px; }
        .day-toggle button { background: transparent; border: none; padding: 6px 18px; border-radius: 30px; font-weight: 600; font-size: 13px; color: var(--muted); cursor: pointer; transition: 0.2s; }
        .day-toggle button.active { background: var(--accent); color: #0b0b14; }
        .add-stop-area { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; background: var(--card2); padding: 12px; border-radius: 16px; border: 1px solid var(--border); }
        .add-stop-area input { flex: 1 1 160px; background: #0b0b14; border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 30px; font-size: 14px; min-width: 120px; }
        .add-stop-area input:focus { border-color: var(--accent); outline: none; }
        .add-stop-area .btn-add { background: var(--accent); color: #0b0b14; border: none; padding: 10px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; }
        .stop-list { display: flex; flex-direction: column; gap: 8px; max-height: 480px; overflow-y: auto; padding-right: 4px; }
        .stop-item { background: var(--card2); border-radius: 14px; padding: 12px 16px; border-left: 5px solid transparent; display: flex; align-items: center; gap: 12px; cursor: grab; transition: 0.15s; border: 1px solid var(--border); position: relative; }
        .stop-item:hover { border-color: #3a3a5a; }
        .stop-item.completed { background: #0f2a1a; border-left-color: #2ecc71; opacity: 0.9; order: 999; }
        .stop-item .info { flex: 1; min-width: 0; }
        .stop-item .info .name { font-weight: 600; }
        .stop-item .info .addr { font-size: 13px; color: var(--muted); }
        .stop-item .info .city { font-size: 12px; color: var(--muted); }
        .stop-item .assign-badge { background: #1a1a2e; padding: 4px 14px; border-radius: 30px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); white-space: nowrap; }
        .stop-item .actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .stop-item .actions button { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 6px; border-radius: 8px; transition: 0.2s; }
        .stop-item .actions button:hover { background: #2a2a3e; color: white; }
        .stop-item .assign-select { background: #0b0b14; border: 1px solid var(--border); color: var(--text); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
        .stop-item .timestamp { font-size: 11px; color: #2ecc71; font-weight: 600; margin-left: 4px; }

        .driver-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; padding: 16px; backdrop-filter: blur(4px); }
        .driver-modal .modal-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .driver-modal .modal-header { display: flex; justify-content: space-between; align-items: center; }
        .driver-modal .modal-header h2 { display: flex; align-items: center; gap: 10px; }
        .driver-modal .modal-map { height: 260px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: #0b0b14; }
        .driver-modal .modal-map #driver-map { width: 100%; height: 100%; }
        .driver-modal .modal-stops { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .driver-modal .modal-stops .stop-item { background: #12121c; border-left-color: var(--driver-color, #f7c948); }

        .settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 16px; backdrop-filter: blur(4px); }
        .settings-modal .settings-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; max-width: 520px; width: 100%; padding: 28px; max-height: 90vh; overflow-y: auto; }
        .settings-card h2 { margin-bottom: 20px; }
        .settings-card .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
        .settings-card .field label { font-weight: 600; font-size: 14px; }
        .settings-card .field input { background: #0b0b14; border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 12px; }
        .settings-card .field input:focus { border-color: var(--accent); outline: none; }
        .settings-card .driver-row { display: flex; gap: 8px; align-items: center; background: var(--card2); padding: 8px 12px; border-radius: 14px; margin-bottom: 8px; }
        .settings-card .driver-row input { flex: 1; background: transparent; border: none; color: var(--text); padding: 6px 4px; }
        .settings-card .driver-row input.color-pick { width: 40px; padding: 0; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; }
        .settings-card .driver-row .remove-driver { background: transparent; border: none; color: #e74c3c; font-weight: 700; cursor: pointer; }
        .settings-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
        .settings-actions button { padding: 10px 24px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; }

        .demo-banner { background: #2a1a0a; border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 30px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }

        @media (min-width: 900px) { .app-grid { flex-direction: row; flex-wrap: wrap; } .map-wrapper { flex: 2 1 55%; height: 480px; } .manifest-panel { flex: 1 1 40%; } }
        @media (max-width: 600px) { .map-wrapper { height: 260px; } .stop-item { flex-wrap: wrap; } .stop-item .actions { margin-left: auto; } .driver-badge-container { gap: 4px; } .driver-badge { font-size: 11px; padding: 4px 10px; } }
        .hidden { display: none !important; }
        .text-accent { color: var(--accent); }
        .flex { display: flex; align-items: center; }
        .ml-auto { margin-left: auto; }
        .w-full { width: 100%; }
        .mt-2 { margin-top: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f7c948'/%3E%3Cpath d='M30 30 L70 30 L70 70 L30 70 Z' fill='%231a1a2e'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%23f7c948'/%3E%3C/svg%3E" alt="logo" style="height:32px;">
        <span>DISPATCH · PAJ</span>
        <span class="badge">LIVE</span>
    </div>
    <div class="header-actions">
        <span class="demo-banner">⚡ DEMO MODE</span>
        <button onclick="openSettings()">⚙️ Drivers</button>
        <button onclick="nextDayPrompt()">📅 Next Day</button>
    </div>
</header>

<div class="app-grid">
    <div class="map-wrapper">
        <div id="dispatch-map"></div>
        <div class="driver-badge-container" id="driverBadges"></div>
    </div>

    <div class="manifest-panel">
        <div class="panel-header">
            <h2>📋 Manifest <span id="dayLabel" style="font-size:14px; font-weight:400; color:var(--muted);">Today</span></h2>
            <div class="day-toggle">
                <button class="active" data-day="today" onclick="switchDay('today')">Today</button>
                <button data-day="tomorrow" onclick="switchDay('tomorrow')">Tomorrow</button>
            </div>
        </div>

        <div class="add-stop-area" id="addStopArea">
            <input type="text" id="stopName" placeholder="Business name" autocomplete="off">
            <input type="text" id="stopAddress" placeholder="Address" autocomplete="off">
            <input type="text" id="stopCity" placeholder="City" autocomplete="off">
            <button class="btn-add" onclick="addStop()">+ Add</button>
        </div>

        <div class="stop-list" id="stopList"></div>
        <div id="emptyMsg" style="text-align:center; color:var(--muted); padding:20px;">No stops — add one above.</div>
    </div>
</div>

<!-- Driver Modal -->
<div class="driver-modal" id="driverModal">
    <div class="modal-card">
        <div class="modal-header">
            <h2 id="driverModalTitle">👤 Driver</h2>
            <button onclick="closeDriverModal()" style="background:transparent; border:none; color:white; font-size:28px; cursor:pointer;">✕</button>
        </div>
        <div class="modal-map"><div id="driver-map"></div></div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0;">
            <span id="driverLastUpdate" style="font-size:13px; color:var(--muted);">Last update: —</span>
            <span id="driverStopCount" style="font-weight:600;">0 stops</span>
        </div>
        <div class="modal-stops" id="driverModalStops"></div>
    </div>
</div>

<!-- Settings Modal -->
<div class="settings-modal" id="settingsModal">
    <div class="settings-card">
        <h2>⚙️ Drivers &amp; API</h2>
        <div style="background:#1a2a1a; border:1px solid #2ecc71; border-radius:12px; padding:10px; margin-bottom:16px; font-size:13px; color:#2ecc71;">
            ⚡ DEMO MODE: Drivers are stored in memory. Refresh to reset.
        </div>
        <div class="field">
            <label>PAJ GPS Master Email</label>
            <input type="email" id="pajEmail" placeholder="admin@company.com">
        </div>
        <div class="field">
            <label>PAJ GPS Password</label>
            <input type="password" id="pajPassword" placeholder="••••••••">
        </div>
        <div style="border-top:1px solid var(--border); margin:16px 0;"></div>
        <div id="driverSettingsList"></div>
        <button onclick="addDriverRow()" style="background:var(--card2); border:1px dashed var(--border); color:var(--text); padding:10px; border-radius:20px; width:100%; margin-top:8px; cursor:pointer;">+ Add Driver</button>
        <div class="settings-actions">
            <button onclick="saveSettings()" style="background:var(--accent); color:#0b0b14;">Save</button>
            <button onclick="closeSettings()" style="background:transparent; border:1px solid var(--border); color:var(--text);">Close</button>
        </div>
    </div>
</div>

<!-- Firebase + Google Maps -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI&libraries=places,geometry&callback=initMap" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<script>
// ===== FIREBASE (with error handling) =====
firebase.initializeApp({
    apiKey: "AIzaSyAKmgoXA4m3cRTmxJq4aUyva5SVvFbTNqg",
    authDomain: "eandccourier-36fcc.firebaseapp.com",
    databaseURL: "https://eandccourier-36fcc-default-rtdb.firebaseio.com",
    projectId: "eandccourier-36fcc",
});
const db = firebase.database();

// ===== DEMO STORAGE (fallback when Firebase permissions fail) =====
let demoDrivers = {};
let demoStopsToday = {};
let demoStopsTomorrow = {};
let useDemoMode = true; // fallback to demo if Firebase fails

// ===== STATE =====
let drivers = {};
let stopsToday = {};
let stopsTomorrow = {};
let currentDay = 'today';
let map, mapMarkers = {}, driverMarkers = {};
let activeModalDriverId = null;
let sortableInstance = null;
let gpsInterval = null;
let pajToken = null;
const PAJ_BASE = 'https://connect.paj-gps.de/api/v1';

// ===== HELPERS =====
function getStopsRef() { return db.ref(`developer/dispatch_dashboard/stops_${currentDay}`); }
function getDriversRef() { return db.ref('developer/dispatch_dashboard/drivers'); }
function getMasterRef() { return db.ref('developer/dispatch_dashboard/master_config'); }

// ===== FIREBASE WRAPPER WITH DEMO FALLBACK =====
function fbSet(ref, data) {
    return ref.set(data).catch(err => {
        console.warn('Firebase set failed, using demo storage:', err);
        // Store in demo memory
        const path = ref.toString().replace('https://eandccourier-36fcc-default-rtdb.firebaseio.com/', '');
        if (path.includes('drivers')) {
            const key = path.split('/').pop();
            if (key && key.length > 10) demoDrivers[key] = data;
            else Object.assign(demoDrivers, data);
        } else if (path.includes('stops_today')) {
            Object.assign(demoStopsToday, data);
        } else if (path.includes('stops_tomorrow')) {
            Object.assign(demoStopsTomorrow, data);
        }
        return Promise.resolve();
    });
}

function fbUpdate(ref, data) {
    return ref.update(data).catch(err => {
        console.warn('Firebase update failed, using demo storage:', err);
        const path = ref.toString().replace('https://eandccourier-36fcc-default-rtdb.firebaseio.com/', '');
        if (path.includes('drivers')) {
            for (let key in data) {
                if (key.includes('/')) {
                    const [id, sub] = key.split('/');
                    if (demoDrivers[id]) demoDrivers[id][sub] = data[key];
                } else {
                    demoDrivers[key] = data[key];
                }
            }
        } else if (path.includes('stops_today')) {
            for (let key in data) {
                if (key.includes('/')) {
                    const [id, sub] = key.split('/');
                    if (demoStopsToday[id]) demoStopsToday[id][sub] = data[key];
                } else {
                    demoStopsToday[key] = data[key];
                }
            }
        } else if (path.includes('stops_tomorrow')) {
            for (let key in data) {
                if (key.includes('/')) {
                    const [id, sub] = key.split('/');
                    if (demoStopsTomorrow[id]) demoStopsTomorrow[id][sub] = data[key];
                } else {
                    demoStopsTomorrow[key] = data[key];
                }
            }
        }
        return Promise.resolve();
    });
}

function fbPush(ref, data) {
    return ref.push(data).then(snap => {
        return { key: snap.key };
    }).catch(err => {
        console.warn('Firebase push failed, using demo storage:', err);
        const key = 'demo_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
        const path = ref.toString().replace('https://eandccourier-36fcc-default-rtdb.firebaseio.com/', '');
        if (path.includes('stops_today')) {
            demoStopsToday[key] = data;
        } else if (path.includes('stops_tomorrow')) {
            demoStopsTomorrow[key] = data;
        } else if (path.includes('drivers')) {
            demoDrivers[key] = data;
        }
        return { key };
    });
}

function fbOnce(ref) {
    return ref.once('value').then(snap => snap).catch(err => {
        console.warn('Firebase once failed, using demo storage:', err);
        const path = ref.toString().replace('https://eandccourier-36fcc-default-rtdb.firebaseio.com/', '');
        let data = {};
        if (path.includes('drivers')) data = demoDrivers;
        else if (path.includes('stops_today')) data = demoStopsToday;
        else if (path.includes('stops_tomorrow')) data = demoStopsTomorrow;
        return { val: () => data, exists: () => Object.keys(data).length > 0 };
    });
}

function fbOn(ref, callback) {
    ref.on('value', snap => {
        callback(snap);
    });
    // Also listen to demo changes via polling (simplified)
    setInterval(() => {
        const path = ref.toString().replace('https://eandccourier-36fcc-default-rtdb.firebaseio.com/', '');
        let data = {};
        if (path.includes('drivers')) data = demoDrivers;
        else if (path.includes('stops_today')) data = demoStopsToday;
        else if (path.includes('stops_tomorrow')) data = demoStopsTomorrow;
        callback({ val: () => data, exists: () => Object.keys(data).length > 0 });
    }, 3000);
}

// ===== INIT =====
function initApp() {
    // Load drivers
    fbOn(getDriversRef(), snap => {
        drivers = snap.val() || {};
        // Merge with demo
        for (let key in demoDrivers) {
            if (!drivers[key]) drivers[key] = demoDrivers[key];
        }
        renderDriverBadges();
        updateAllMarkers();
        renderSettingsList();
    });

    // Load stops
    fbOn(db.ref('developer/dispatch_dashboard/stops_today'), snap => {
        stopsToday = snap.val() || {};
        for (let key in demoStopsToday) {
            if (!stopsToday[key]) stopsToday[key] = demoStopsToday[key];
        }
        if (currentDay === 'today') renderStopList();
    });
    fbOn(db.ref('developer/dispatch_dashboard/stops_tomorrow'), snap => {
        stopsTomorrow = snap.val() || {};
        for (let key in demoStopsTomorrow) {
            if (!stopsTomorrow[key]) stopsTomorrow[key] = demoStopsTomorrow[key];
        }
        if (currentDay === 'tomorrow') renderStopList();
    });

    // Load master config
    fbOnce(getMasterRef()).then(snap => {
        const cfg = snap.val() || {};
        document.getElementById('pajEmail').value = cfg.paj_email || '';
        document.getElementById('pajPassword').value = cfg.paj_password || '';
        pajToken = cfg.paj_token || null;
    });

    // Start GPS polling (simulated)
    if (gpsInterval) clearInterval(gpsInterval);
    gpsInterval = setInterval(() => {
        // Simulate driver movement
        for (let id in drivers) {
            if (!drivers[id].lastLocation) {
                drivers[id].lastLocation = {
                    lat: 49.84 + (Math.random() - 0.5) * 0.1,
                    lng: -99.95 + (Math.random() - 0.5) * 0.1,
                    updatedAt: Date.now()
                };
            } else {
                drivers[id].lastLocation.lat += (Math.random() - 0.5) * 0.001;
                drivers[id].lastLocation.lng += (Math.random() - 0.5) * 0.001;
                drivers[id].lastLocation.updatedAt = Date.now();
            }
        }
        updateAllMarkers();
        renderDriverBadges();
    }, 5000);

    // Add demo drivers if empty
    if (Object.keys(drivers).length === 0) {
        const demoColors = ['#f7c948', '#ff6b6b', '#4ecdc4', '#45b7d1'];
        const demoNames = ['Driver 1', 'Driver 2', 'Driver 3', 'Driver 4'];
        demoNames.forEach((name, i) => {
            const key = 'demo_driver_' + i;
            demoDrivers[key] = { name, color: demoColors[i % demoColors.length], deviceId: 'DEV' + (1000 + i) };
            drivers[key] = demoDrivers[key];
        });
        renderDriverBadges();
        renderSettingsList();
    }
}

// ===== MAP =====
let mapInitialized = false;
function initMap() {
    if (mapInitialized) return;
    map = new google.maps.Map(document.getElementById('dispatch-map'), {
        center: { lat: 49.8425, lng: -99.9497 }, zoom: 11,
        styles: [{"featureType":"all","elementType":"all","stylers":[{"invert_lightness":true},{"saturation":10},{"lightness":30},{"gamma":0.5},{"hue":"#435158"}]}]
    });
    mapInitialized = true;
    updateAllMarkers();
    const addrInput = document.getElementById('stopAddress');
    if (addrInput) new google.maps.places.Autocomplete(addrInput, { componentRestrictions: { country: 'ca' } });
}

function updateAllMarkers() {
    if (!map) return;
    Object.values(mapMarkers).forEach(m => m.setMap(null));
    mapMarkers = {};
    for (let [id, drv] of Object.entries(drivers)) {
        if (!drv.lastLocation) continue;
        const pos = drv.lastLocation;
        const marker = new google.maps.Marker({
            position: { lat: pos.lat, lng: pos.lng },
            map: map,
            label: { text: drv.name || 'Driver', color: '#fff', fontWeight: 'bold', fontSize: '12px' },
            icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor: drv.color || '#f7c948', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
        });
        mapMarkers[id] = marker;
    }
    if (Object.keys(mapMarkers).length > 0) {
        const bounds = new google.maps.LatLngBounds();
        Object.values(mapMarkers).forEach(m => bounds.extend(m.getPosition()));
        map.fitBounds(bounds);
    }
}

// ===== DRIVER BADGES =====
function renderDriverBadges() {
    const container = document.getElementById('driverBadges');
    container.innerHTML = '';
    for (let [id, drv] of Object.entries(drivers)) {
        const badge = document.createElement('div');
        badge.className = 'driver-badge';
        badge.style.borderLeftColor = drv.color || '#f7c948';
        const dot = `<span class="dot" style="background:${drv.color || '#f7c948'}"></span>`;
        const lastUpdate = drv.lastLocation ? ((Date.now() - drv.lastLocation.updatedAt)/60000).toFixed(0) : '—';
        const updateText = drv.lastLocation ? `${lastUpdate}m ago` : 'offline';
        badge.innerHTML = `${dot} ${drv.name || 'Driver'} <span class="last-update">${updateText}</span>`;
        badge.onclick = () => { zoomToDriver(id); };
        container.appendChild(badge);
    }
}

function zoomToDriver(driverId) {
    const drv = drivers[driverId];
    if (!drv || !drv.lastLocation) return;
    const pos = drv.lastLocation;
    if (map) {
        map.panTo({ lat: pos.lat, lng: pos.lng });
        map.setZoom(14);
    }
    openDriverModal(driverId);
}

// ===== DRIVER MODAL =====
function openDriverModal(driverId) {
    const modal = document.getElementById('driverModal');
    modal.style.display = 'flex';
    activeModalDriverId = driverId;
    const drv = drivers[driverId];
    document.getElementById('driverModalTitle').innerHTML = `👤 ${drv?.name || 'Driver'}`;
    setTimeout(() => {
        const container = document.getElementById('driver-map');
        if (!container._map) {
            const m = new google.maps.Map(container, {
                center: drv?.lastLocation ? { lat: drv.lastLocation.lat, lng: drv.lastLocation.lng } : { lat: 49.8425, lng: -99.9497 },
                zoom: 13,
                styles: [{"featureType":"all","elementType":"all","stylers":[{"invert_lightness":true},{"saturation":10},{"lightness":30},{"gamma":0.5},{"hue":"#435158"}]}]
            });
            container._map = m;
        }
        const mmap = container._map;
        if (drv?.lastLocation) {
            const pos = drv.lastLocation;
            mmap.panTo({ lat: pos.lat, lng: pos.lng });
            mmap.setZoom(14);
        }
        if (container._markers) container._markers.forEach(m => m.setMap(null));
        container._markers = [];
        if (drv?.lastLocation) {
            const mk = new google.maps.Marker({
                position: { lat: drv.lastLocation.lat, lng: drv.lastLocation.lng },
                map: mmap,
                label: { text: drv.name, color: '#fff', fontWeight: 'bold' },
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor: drv.color || '#f7c948', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
            });
            container._markers.push(mk);
        }
        const allStops = currentDay === 'today' ? stopsToday : stopsTomorrow;
        const assigned = Object.entries(allStops).filter(([id, s]) => s.assignedDriver === driverId && s.status !== 'completed');
        if (container._polyline) container._polyline.setMap(null);
        if (assigned.length > 1) {
            const path = assigned.map(([id, s]) => ({ lat: s.lat || 0, lng: s.lng || 0 })).filter(p => p.lat && p.lng);
            if (path.length > 1) {
                const poly = new google.maps.Polyline({ path, map: mmap, strokeColor: drv.color || '#f7c948', strokeWeight: 4 });
                container._polyline = poly;
            }
        }
        assigned.forEach(([id, s]) => {
            if (s.lat && s.lng) {
                const mk = new google.maps.Marker({
                    position: { lat: s.lat, lng: s.lng },
                    map: mmap,
                    label: { text: s.name || 'Stop', color: '#fff', fontSize: '11px' },
                    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: '#2ecc71', fillOpacity: 0.8, strokeColor: '#fff', strokeWeight: 1 }
                });
                container._markers.push(mk);
            }
        });
        renderDriverStops(driverId);
        const lastUp = drv?.lastLocation ? ((Date.now() - drv.lastLocation.updatedAt)/60000).toFixed(0) : '—';
        document.getElementById('driverLastUpdate').textContent = `Last update: ${lastUp}m ago`;
        document.getElementById('driverStopCount').textContent = `${assigned.length} stops`;
    }, 200);
}

function closeDriverModal() {
    document.getElementById('driverModal').style.display = 'none';
    activeModalDriverId = null;
}

function renderDriverStops(driverId) {
    const container = document.getElementById('driverModalStops');
    const allStops = currentDay === 'today' ? stopsToday : stopsTomorrow;
    const assigned = Object.entries(allStops).filter(([id, s]) => s.assignedDriver === driverId);
    container.innerHTML = '';
    if (assigned.length === 0) { container.innerHTML = '<div style="color:var(--muted);padding:12px;">No assigned stops</div>'; return; }
    assigned.sort((a,b) => (a[1].order || 0) - (b[1].order || 0));
    assigned.forEach(([id, s]) => {
        const div = document.createElement('div');
        div.className = `stop-item ${s.status === 'completed' ? 'completed' : ''}`;
        div.style.borderLeftColor = drivers[driverId]?.color || '#f7c948';
        const ts = s.status === 'completed' ? `<span class="timestamp">✓ ${s.completedAt ? new Date(s.completedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : ''}</span>` : '';
        div.innerHTML = `
            <div class="info"><div class="name">${s.name || 'No name'} ${ts}</div><div class="addr">${s.address || ''} ${s.city || ''}</div></div>
            <div class="actions">
                ${s.status === 'completed' ? `<button onclick="reopenStop('${id}')" title="Re-open">↩️</button>` : `<button onclick="completeStop('${id}')" title="Complete">✅</button>`}
                <button onclick="moveToTomorrow('${id}')" title="→ tomorrow">➡️</button>
            </div>
        `;
        container.appendChild(div);
    });
}

// ===== STOP LIST =====
function renderStopList() {
    const container = document.getElementById('stopList');
    const empty = document.getElementById('emptyMsg');
    const allStops = currentDay === 'today' ? stopsToday : stopsTomorrow;
    const entries = Object.entries(allStops);
    if (entries.length === 0) { container.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    entries.sort((a,b) => {
        if (a[1].status === 'completed' && b[1].status !== 'completed') return 1;
        if (a[1].status !== 'completed' && b[1].status === 'completed') return -1;
        return (a[1].order || 0) - (b[1].order || 0);
    });
    let html = '';
    for (let [id, s] of entries) {
        const isCompleted = s.status === 'completed';
        const ts = isCompleted ? `<span class="timestamp">✓ ${s.completedAt ? new Date(s.completedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : ''}</span>` : '';
        const driverName = s.assignedDriver && drivers[s.assignedDriver] ? drivers[s.assignedDriver].name : 'Unassigned';
        const color = s.assignedDriver && drivers[s.assignedDriver] ? drivers[s.assignedDriver].color : '#555';
        html += `
            <div class="stop-item ${isCompleted ? 'completed' : ''}" data-id="${id}" style="border-left-color:${color};">
                <div class="info">
                    <div class="name">${s.name || 'No name'} ${ts}</div>
                    <div class="addr">${s.address || ''} ${s.city || ''}</div>
                </div>
                <div class="assign-badge" style="border-color:${color};">${driverName}</div>
                <div class="actions">
                    <select class="assign-select" onchange="assignStop('${id}', this.value)">
                        <option value="">Unassign</option>
                        ${Object.entries(drivers).map(([did, d]) => `<option value="${did}" ${s.assignedDriver === did ? 'selected' : ''}>${d.name}</option>`).join('')}
                    </select>
                    ${isCompleted ? `<button onclick="reopenStop('${id}')" title="Re-open">↩️</button>` : `<button onclick="completeStop('${id}')" title="Complete">✅</button>`}
                    <button onclick="moveToTomorrow('${id}')" title="→ tomorrow">➡️</button>
                    <button onclick="deleteStop('${id}')" style="color:#e74c3c;">✕</button>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
    if (sortableInstance) sortableInstance.destroy();
    sortableInstance = new Sortable(container, {
        animation: 150, delay: 400, delayOnTouchOnly: true,
        onEnd: function(evt) {
            const items = container.querySelectorAll('.stop-item');
            const newOrder = Array.from(items).map(el => el.dataset.id);
            const allStops = currentDay === 'today' ? stopsToday : stopsTomorrow;
            const updates = {};
            newOrder.forEach((id, idx) => { updates[`${id}/order`] = idx; });
            const ref = currentDay === 'today' ? db.ref('developer/dispatch_dashboard/stops_today') : db.ref('developer/dispatch_dashboard/stops_tomorrow');
            fbUpdate(ref, updates);
        }
    });
}

// ===== STOP ACTIONS =====
function addStop() {
    const name = document.getElementById('stopName').value.trim();
    const address = document.getElementById('stopAddress').value.trim();
    const city = document.getElementById('stopCity').value.trim();
    if (!name || !address || !city) { alert('Fill all fields'); return; }
    const ref = currentDay === 'today' ? db.ref('developer/dispatch_dashboard/stops_today') : db.ref('developer/dispatch_dashboard/stops_tomorrow');
    const stop = { name, address, city, assignedDriver: null, status: 'pending', completedAt: null, order: Date.now() };
    fbPush(ref, stop);
    document.getElementById('stopName').value = '';
    document.getElementById('stopAddress').value = '';
    document.getElementById('stopCity').value = '';
}

function completeStop(id) {
    const ref = currentDay === 'today' ? db.ref('developer/dispatch_dashboard/stops_today') : db.ref('developer/dispatch_dashboard/stops_tomorrow');
    fbUpdate(ref, { [`${id}/status`]: 'completed', [`${id}/completedAt`]: Date.now() });
    if (activeModalDriverId) renderDriverStops(activeModalDriverId);
}

function reopenStop(id) {
    const ref = currentDay === 'today' ? db.ref('developer/dispatch_dashboard/stops_today') : db.ref('developer/dispatch_dashboard/stops_tomorrow');
    fbUpdate(ref, { [`${id}/status`]: 'pending', [`${id}/completedAt`]: null });
    if (activeModalDriverId) renderDriverStops(activeModalDriverId);
}

function assignStop(id, driverId) {
    const ref = currentDay === 'today' ? db.ref('developer/dispatch_dashboard/stops_today') : db.ref('developer/dispatch_dashboard/stops_tomorrow');
    fbUpdate(ref, { [`${id}/assignedDriver`]: driverId || null });
    if (activeModalDriverId) renderDriverStops(activeModalDriverId);
}

function moveToTomorrow(id) {
    const refToday = db.ref('developer/dispatch_dashboard/stops_today');
    const refTomorrow = db.ref('developer/dispatch_dashboard/stops_tomorrow');
    fbOnce(refToday.child(id)).then(snap => {
        const val = snap.val();
        if (!val) return;
        fbPush(refTomorrow, val).then(() => {
            fbUpdate(refToday, { [id]: null });
        });
    });
}

function deleteStop(id) {
    if (!confirm('Delete stop?')) return;
    const ref = currentDay === 'today' ? db.ref('developer/dispatch_dashboard/stops_today') : db.ref('developer/dispatch_dashboard/stops_tomorrow');
    fbUpdate(ref, { [id]: null });
}

function switchDay(day) {
    currentDay = day;
    document.querySelectorAll('.day-toggle button').forEach(b => b.classList.toggle('active', b.dataset.day === day));
    document.getElementById('dayLabel').textContent = day === 'today' ? 'Today' : 'Tomorrow';
    renderStopList();
    closeDriverModal();
}

function nextDayPrompt() {
    if (confirm('Move all pending stops to tomorrow? Completed stops will be cleared.')) {
        const refToday = db.ref('developer/dispatch_dashboard/stops_today');
        const refTomorrow = db.ref('developer/dispatch_dashboard/stops_tomorrow');
        fbOnce(refToday).then(snap => {
            const data = snap.val() || {};
            const pending = Object.entries(data).filter(([id, s]) => s.status !== 'completed');
            const updates = {};
            pending.forEach(([id, s]) => { updates[id] = s; });
            fbUpdate(refTomorrow, updates).then(() => {
                const completedIds = Object.entries(data).filter(([id, s]) => s.status === 'completed').map(([id]) => id);
                const removes = {};
                completedIds.forEach(id => { removes[id] = null; });
                pending.forEach(([id]) => { removes[id] = null; });
                fbUpdate(refToday, removes);
                switchDay('tomorrow');
            });
        });
    }
}

// ===== SETTINGS =====
function openSettings() {
    document.getElementById('settingsModal').style.display = 'flex';
    renderSettingsList();
}
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

function renderSettingsList() {
    const container = document.getElementById('driverSettingsList');
    container.innerHTML = '';
    for (let [id, drv] of Object.entries(drivers)) {
        const row = document.createElement('div');
        row.className = 'driver-row';
        row.innerHTML = `
            <input type="text" value="${drv.name || ''}" placeholder="Name" data-id="${id}" class="drv-name">
            <input type="color" value="${drv.color || '#f7c948'}" data-id="${id}" class="drv-color color-pick">
            <input type="text" value="${drv.deviceId || ''}" placeholder="Device ID" data-id="${id}" class="drv-device">
            <button class="remove-driver" onclick="removeDriver('${id}')">✕</button>
        `;
        container.appendChild(row);
    }
}

function addDriverRow() {
    const ref = getDriversRef();
    const newRef = ref.push();
    const driverData = { name: 'Driver', color: '#f7c948', deviceId: '' };
    fbPush(ref, driverData).then(result => {
        // Update local
        const id = result.key;
        drivers[id] = driverData;
        demoDrivers[id] = driverData;
        renderSettingsList();
        renderDriverBadges();
    });
}

function removeDriver(id) {
    if (!confirm('Remove this driver? All assigned stops will be unassigned.')) return;
    const ref = getDriversRef();
    fbUpdate(ref, { [id]: null });
    delete drivers[id];
    delete demoDrivers[id];
    // unassign stops
    const refToday = db.ref('developer/dispatch_dashboard/stops_today');
    const refTomorrow = db.ref('developer/dispatch_dashboard/stops_tomorrow');
    fbOnce(refToday).then(snap => {
        const data = snap.val() || {};
        const updates = {};
        Object.entries(data).filter(([id, s]) => s.assignedDriver === id).forEach(([id]) => { updates[`${id}/assignedDriver`] = null; });
        fbUpdate(refToday, updates);
    });
    fbOnce(refTomorrow).then(snap => {
        const data = snap.val() || {};
        const updates = {};
        Object.entries(data).filter(([id, s]) => s.assignedDriver === id).forEach(([id]) => { updates[`${id}/assignedDriver`] = null; });
        fbUpdate(refTomorrow, updates);
    });
    renderSettingsList();
    renderDriverBadges();
}

function saveSettings() {
    const email = document.getElementById('pajEmail').value.trim();
    const pass = document.getElementById('pajPassword').value.trim();
    fbUpdate(getMasterRef(), { paj_email: email, paj_password: pass });

    const rows = document.querySelectorAll('#driverSettingsList .driver-row');
    rows.forEach(row => {
        const id = row.querySelector('.drv-name').dataset.id;
        const name = row.querySelector('.drv-name').value;
        const color = row.querySelector('.drv-color').value;
        const deviceId = row.querySelector('.drv-device').value;
        if (id) {
            fbUpdate(getDriversRef(), { [`${id}/name`]: name, [`${id}/color`]: color, [`${id}/deviceId`]: deviceId });
            if (drivers[id]) {
                drivers[id].name = name;
                drivers[id].color = color;
                drivers[id].deviceId = deviceId;
            }
        }
    });
    renderDriverBadges();
    renderStopList();
    closeSettings();
}

// ===== THEME TOGGLE =====
function toggleTheme() {}

// ===== START =====
initApp();
</script>

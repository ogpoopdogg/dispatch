<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E&C Dispatch Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link href="//fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Variables --- */
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --card-hover: #252540;
            --text: #e8e8f0;
            --text-muted: #8888aa;
            --accent: #facc15;
            --border: #2a2a44;
            --input-bg: #22223a;
            --input-border: #3a3a5a;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --radius: 12px;
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, 0.15);
            --red: #ef4444;
            --blue: #3b82f6;
            --header-bg: #0a0a16;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        /* --- Header --- */
        header {
            padding: 12px 16px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-logo {
            height: 28px;
            width: auto;
            filter: drop-shadow(0 0 6px var(--accent));
            cursor: pointer;
        }
        .shiny-text {
            background: linear-gradient(to right, var(--accent) 20%, #aaa 50%, var(--accent) 80%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: text-shine 3s linear infinite;
            font-weight: 700;
            font-size: 14px;
        }
        @keyframes text-shine { to { background-position: 200% center; } }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .header-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-btn:hover {
            background: var(--card-hover);
            border-color: var(--accent);
        }
        .header-btn .badge {
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            padding: 0 6px;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
        }

        /* --- Login Overlay --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .login-box {
            width: 100%;
            max-width: 360px;
            background: var(--card);
            padding: 40px 32px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
        }
        .login-box h2 {
            color: var(--accent);
            margin-bottom: 24px;
            font-size: 20px;
        }
        .login-input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-input:focus { border-color: var(--accent); }
        .login-submit {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: var(--accent);
            border: none;
            color: #000;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: opacity 0.2s;
        }
        .login-submit:hover { opacity: 0.85; }

        /* --- Settings Modal --- */
        #settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        #settings-modal.open { display: flex; }
        .settings-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .settings-box h3 {
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 18px;
        }
        .settings-box label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin: 12px 0 4px;
        }
        .settings-box input {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .settings-box input:focus { border-color: var(--accent); }
        .settings-box .driver-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .settings-box .driver-row input[type="text"] { flex: 1; min-width: 80px; }
        .settings-box .driver-row input[type="color"] {
            width: 44px;
            height: 44px;
            padding: 0;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .settings-box .driver-row .remove-driver {
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
        }
        .settings-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .settings-actions button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .settings-actions .save-settings { background: var(--accent); color: #000; }
        .settings-actions .close-settings { background: var(--input-bg); color: var(--text); }
        .settings-actions .add-driver { background: var(--blue); color: #fff; }

        /* --- Main Layout --- */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px 16px;
        }

        /* --- Map Container --- */
        .map-wrapper {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            height: 420px;
            margin-bottom: 16px;
        }
        #main-map {
            width: 100%;
            height: 100%;
        }
        .map-overlay-controls {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 10;
            pointer-events: none;
        }
        .map-overlay-controls .driver-chip {
            pointer-events: auto;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow);
        }
        .map-overlay-controls .driver-chip:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }
        .map-overlay-controls .driver-chip .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        /* --- Driver Tabs --- */
        .driver-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 12px;
            flex-wrap: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .driver-tabs::-webkit-scrollbar { height: 3px; }
        .driver-tabs::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        .driver-tab {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 16px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .driver-tab .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .driver-tab .stop-count {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 0 8px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .driver-tab:hover { border-color: var(--accent); }
        .driver-tab.active {
            border-color: var(--accent);
            background: var(--card-hover);
        }
        .driver-tab .offline-indicator {
            font-size: 10px;
            color: var(--red);
        }

        /* --- Driver Detail Modal --- */
        #driver-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 3000;
            padding: 16px;
            backdrop-filter: blur(4px);
            overflow-y: auto;
        }
        #driver-modal.open { display: flex; align-items: flex-start; justify-content: center; }
        .driver-modal-content {
            background: var(--card);
            border-radius: var(--radius);
            max-width: 900px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            padding: 20px;
            position: relative;
        }
        .driver-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .driver-modal-header h3 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .driver-modal-header .close-modal {
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }
        .driver-modal-map {
            height: 300px;
            background: var(--bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .driver-modal-map .driver-map { width: 100%; height: 100%; }

        /* --- Manifest / Stop List --- */
        .manifest-section {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .manifest-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .manifest-header h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .manifest-header h4 span { color: var(--text); }
        .manifest-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .manifest-actions button {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .manifest-actions button:hover {
            border-color: var(--accent);
            background: var(--card-hover);
        }
        .manifest-actions .next-day-btn { background: var(--blue); color: #fff; border-color: var(--blue); }
        .manifest-actions .clear-completed-btn { background: var(--red); color: #fff; border-color: var(--red); }

        /* --- Add Stop Form --- */
        .add-stop-form {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            background: var(--input-bg);
        }
        .add-stop-form .input-wrap {
            flex: 1;
            min-width: 120px;
            position: relative;
        }
        .add-stop-form input {
            width: 100%;
            padding: 10px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-stop-form input:focus { border-color: var(--accent); }
        .add-stop-form .add-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .add-stop-form .add-btn:hover { opacity: 0.85; }

        /* --- Stop List Items --- */
        .stop-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .stop-list .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .stop-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            cursor: grab;
            transition: background 0.15s;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }
        .stop-item:hover { background: var(--card-hover); }
        .stop-item.sortable-ghost { opacity: 0.3; background: var(--accent); }
        .stop-item .stop-info {
            flex: 1;
            min-width: 0;
        }
        .stop-item .stop-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stop-item .stop-address {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stop-item .stop-assign {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .stop-item .stop-assign.has-driver { color: #fff; border-color: transparent; }
        .stop-item .stop-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            align-items: center;
        }
        .stop-item .stop-actions button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 16px;
            transition: all 0.2s;
            line-height: 1;
        }
        .stop-item .stop-actions button:hover { color: var(--text); background: var(--input-bg); }
        .stop-item .stop-actions .next-btn { color: var(--blue); }
        .stop-item .stop-actions .next-btn:hover { color: #60a5fa; }
        .stop-item .stop-status {
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
            min-width: 60px;
            text-align: right;
        }
        .stop-item.completed {
            background: var(--green-bg);
            border-left: 3px solid var(--green);
        }
        .stop-item.completed .stop-status {
            color: var(--green);
        }
        .stop-item .checkmark {
            color: var(--green);
            font-weight: 700;
            margin-right: 4px;
        }
        .stop-item .completion-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* --- Proximity highlight --- */
        .stop-item.proximity-hint {
            border-left: 4px solid var(--accent);
            background: rgba(250, 204, 21, 0.08);
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .map-wrapper { height: 300px; }
            .driver-modal-map { height: 220px; }
            .add-stop-form input { font-size: 14px; }
            .stop-item { flex-wrap: wrap; gap: 6px; }
            .stop-item .stop-assign { font-size: 10px; padding: 2px 8px; }
            .settings-box { padding: 20px; }
        }
        @media (min-width: 1024px) {
            .map-wrapper { height: 500px; }
            .driver-modal-map { height: 400px; }
            .stop-list { max-height: 500px; }
        }

        /* --- Animations --- */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); }
            50% { box-shadow: 0 0 25px rgba(250, 204, 21, 0.4); }
            100% { box-shadow: 0 0 10px rgba(250, 204, 21, 0.2); }
        }
        .map-wrapper.has-drivers { animation: pulse-glow 3s infinite; }

        /* Toast / notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 14px;
            z-index: 9999;
            box-shadow: var(--shadow);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; pointer-events: auto; }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
    </style>
</head>
<body>

    <!-- ===== LOGIN OVERLAY ===== -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>🚚 DISPATCH LOGIN</h2>
            <input type="email" id="login-user" class="login-input" placeholder="Email" autofocus>
            <input type="password" id="login-pin" class="login-input" placeholder="Password">
            <button class="login-submit" onclick="attemptLogin()">Authorize</button>
        </div>
    </div>

    <!-- ===== SETTINGS MODAL ===== -->
    <div id="settings-modal">
        <div class="settings-box">
            <h3>⚙️ Dispatch Settings</h3>

            <label>PAJ GPS Master Account</label>
            <input type="email" id="paj-email" placeholder="PAJ GPS Email">
            <input type="password" id="paj-password" placeholder="PAJ GPS Password" style="margin-top:6px;">

            <label style="margin-top:16px;">Drivers</label>
            <div id="driver-settings-list"></div>

            <button class="add-driver" onclick="addDriverSetting()" style="margin-top:10px; padding:8px 16px; border:none; border-radius:8px; background:var(--blue); color:#fff; font-weight:700; cursor:pointer;">
                + Add Driver
            </button>

            <div class="settings-actions">
                <button class="close-settings" onclick="closeSettings()">Cancel</button>
                <button class="save-settings" onclick="saveSettings()">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- ===== DRIVER DETAIL MODAL ===== -->
    <div id="driver-modal">
        <div class="driver-modal-content">
            <div class="driver-modal-header">
                <h3 id="driver-modal-title">🚗 Driver Name</h3>
                <button class="close-modal" onclick="closeDriverModal()">✕ Close</button>
            </div>
            <div class="driver-modal-map" id="driver-modal-map">
                <div id="driver-map" class="driver-map"></div>
            </div>
            <div id="driver-stop-list" class="stop-list"></div>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>

    <!-- ===== MAIN APP ===== -->
    <header>
        <div class="header-left">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a1a2e'/%3E%3Cpath d='M20 30 L80 30 L75 70 L25 70 Z' fill='%23facc15' opacity='0.8'/%3E%3Ccircle cx='40' cy='55' r='10' fill='%231a1a2e'/%3E%3Ccircle cx='60' cy='55' r='10' fill='%231a1a2e'/%3E%3C/svg%3E" class="header-logo" alt="Logo">
            <span class="shiny-text">DISPATCH DASH</span>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="openSettings()">⚙️ Settings</button>
            <button class="header-btn" id="next-day-btn" onclick="showNextDayPrompt()">📅 Next Day</button>
            <button class="header-btn" onclick="clearCompletedStops()">✅ Clear Done</button>
            <span id="today-label" style="font-size:11px; color:var(--text-muted);"></span>
        </div>
    </header>

    <div class="app-container">

        <!-- ===== MAP ===== -->
        <div class="map-wrapper" id="map-wrapper">
            <div id="main-map"></div>
            <div class="map-overlay-controls" id="driver-chips"></div>
        </div>

        <!-- ===== DRIVER TABS ===== -->
        <div class="driver-tabs" id="driver-tabs"></div>

        <!-- ===== MANIFEST ===== -->
        <div class="manifest-section">
            <div class="manifest-header">
                <h4>📋 Today's Manifest <span id="stop-count">(0)</span></h4>
                <div class="manifest-actions">
                    <button onclick="clearAllStops()">🗑️ Clear All</button>
                </div>
            </div>

            <!-- Add Stop Form -->
            <div class="add-stop-form">
                <div class="input-wrap">
                    <input type="text" id="f-name" placeholder="Business Name" autocomplete="off">
                </div>
                <div class="input-wrap">
                    <input type="text" id="f-address" placeholder="Address" autocomplete="off">
                </div>
                <div class="input-wrap">
                    <input type="text" id="f-city" placeholder="City" autocomplete="off">
                </div>
                <button class="add-btn" onclick="addStop()">+ Add</button>
            </div>

            <!-- Stop List -->
            <div class="stop-list" id="stop-list">
                <div class="empty-state">No stops yet. Add a stop above.</div>
            </div>
        </div>
    </div>

    <!-- ===== FIREBASE & MAPS SCRIPTS ===== -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6umETP8wBUEV41ugAtiNiChUeLmmwmZI&libraries=places,geometry&callback=initMaps" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
        // ============================================================
        //  FIREBASE CONFIG
        // ============================================================
        firebase.initializeApp({
            apiKey: "AIzaSyAKmgoXA4m3cRTmxJq4aUyva5SVvFbTNqg",
            authDomain: "eandccourier-36fcc.firebaseapp.com",
            databaseURL: "https://eandccourier-36fcc-default-rtdb.firebaseio.com",
            projectId: "eandccourier-36fcc",
            messagingSenderId: "1067680083511",
            appId: "1:1067680083511:android:22d1eb3757302492bd19b2"
        });
        const auth = firebase.auth();
        const db = firebase.database();

        // ============================================================
        //  GLOBALS
        // ============================================================
        let currentUser = null;
        let drivers = {};           // { id: { name, color, deviceId, ... } }
        let stopsToday = {};        // { id: { name, address, city, assignedDriver, status, completedAt, order } }
        let stopsTomorrow = {};     // same structure
        let stopOrder = [];         // ordered list of stop IDs for today
        let driverMapInstances = {}; // { driverId: google.maps.Map }
        let driverMarkers = {};     // { driverId: google.maps.Marker }
        let driverPolylines = {};   // { driverId: google.maps.Polyline }
        let mainMap = null;
        let mainMapMarkers = {};    // { driverId: marker }
        let mainMapInitialized = false;
        let allStopsMarkers = {};   // { stopId: marker } for driver maps
        let selectedDriverId = null;
        let autocompleteAddress = null;
        let sortableInstance = null;
        let pajToken = null;
        let pajTokenExpiry = null;
        let gpsInterval = null;
        let driverLocationCache = {}; // { deviceId: { lat, lng, timestamp, lastUpdate } }

        const DEPOT = { lat: 49.8425, lng: -99.9497 };

        // ============================================================
        //  LOGIN
        // ============================================================
        function attemptLogin() {
            const email = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pin').value.trim();
            if (!email || !pass) return;
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                .then(() => auth.signInWithEmailAndPassword(email, pass))
                .catch(err => showToast('Login Failed: ' + err.message, 'error'));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                const email = user.email;
                const username = email.split('@')[0].toLowerCase();
                db.ref(`roles/${username}/command`).once('value').then(snap => {
                    if (snap.val() === true) {
                        currentUser = username;
                        document.getElementById('login-overlay').style.display = 'none';
                        initApp();
                    } else {
                        showToast('ACCESS DENIED', 'error');
                        auth.signOut();
                    }
                });
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        // ============================================================
        //  INIT APP
        // ============================================================
        function initApp() {
            // Load drivers
            db.ref('developer/dispatch_dashboard/drivers').on('value', snap => {
                drivers = snap.val() || {};
                renderDriverTabs();
                renderDriverChips();
                updateDriverSettingsUI();
                // Rebuild driver maps if open
                if (selectedDriverId) openDriverModal(selectedDriverId);
                updateStopList();
            });

            // Load stops today
            db.ref('developer/dispatch_dashboard/stops_today').on('value', snap => {
                stopsToday = snap.val() || {};
                updateStopOrder();
                updateStopList();
                updateStopCount();
                // Update driver stop lists if modal open
                if (selectedDriverId) renderDriverStopList(selectedDriverId);
                updateDriverTabCounts();
            });

            // Load stops tomorrow
            db.ref('developer/dispatch_dashboard/stops_tomorrow').on('value', snap => {
                stopsTomorrow = snap.val() || {};
            });

            // Load PAJ config
            db.ref('developer/dispatch_dashboard/master_config').once('value', snap => {
                const config = snap.val() || {};
                if (config.paj_email) document.getElementById('paj-email').value = config.paj_email;
                if (config.paj_password) document.getElementById('paj-password').value = config.paj_password;
                if (config.paj_token) pajToken = config.paj_token;
                if (config.token_expiry) pajTokenExpiry = config.token_expiry;
                // Start GPS polling if we have token
                if (pajToken) startGPSPolling();
            });

            // Set today's date
            document.getElementById('today-label').textContent = new Date().toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });

            // Init autocomplete
            initPlacesAutocomplete();
        }

        // ============================================================
        //  DRIVER SETTINGS UI
        // ============================================================
        function updateDriverSettingsUI() {
            const container = document.getElementById('driver-settings-list');
            container.innerHTML = '';
            const ids = Object.keys(drivers);
            if (ids.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding:8px 0;">No drivers configured. Add one below.</div>';
                return;
            }
            ids.forEach(id => {
                const d = drivers[id];
                const row = document.createElement('div');
                row.className = 'driver-row';
                row.innerHTML = `
                    <input type="text" class="driver-name-input" value="${d.name || ''}" placeholder="Driver Name" data-id="${id}">
                    <input type="text" class="driver-device-input" value="${d.deviceId || ''}" placeholder="Device ID" data-id="${id}">
                    <input type="color" class="driver-color-input" value="${d.color || '#facc15'}" data-id="${id}">
                    <button class="remove-driver" onclick="removeDriver('${id}')">✕</button>
                `;
                container.appendChild(row);
            });
        }

        function addDriverSetting() {
            const newId = 'driver_' + Date.now();
            const updates = {};
            updates[newId] = { name: 'New Driver', color: '#facc15', deviceId: '' };
            db.ref('developer/dispatch_dashboard/drivers').update(updates);
        }

        function removeDriver(id) {
            if (!confirm('Remove this driver? All assigned stops will become unassigned.')) return;
            // Unassign stops
            const updates = {};
            Object.keys(stopsToday).forEach(sid => {
                if (stopsToday[sid].assignedDriver === id) {
                    updates[`developer/dispatch_dashboard/stops_today/${sid}/assignedDriver`] = null;
                }
            });
            db.ref('developer/dispatch_dashboard/stops_today').update(updates);
            db.ref(`developer/dispatch_dashboard/drivers/${id}`).remove();
        }

        function saveSettings() {
            const email = document.getElementById('paj-email').value.trim();
            const password = document.getElementById('paj-password').value.trim();

            // Save driver names/colors/device IDs from inputs
            const nameInputs = document.querySelectorAll('.driver-name-input');
            const deviceInputs = document.querySelectorAll('.driver-device-input');
            const colorInputs = document.querySelectorAll('.driver-color-input');
            const updates = {};
            nameInputs.forEach(inp => {
                const id = inp.dataset.id;
                updates[`${id}/name`] = inp.value.trim() || 'Driver';
            });
            deviceInputs.forEach(inp => {
                const id = inp.dataset.id;
                updates[`${id}/deviceId`] = inp.value.trim() || '';
            });
            colorInputs.forEach(inp => {
                const id = inp.dataset.id;
                updates[`${id}/color`] = inp.value || '#facc15';
            });

            // Also update PAJ config
            const configUpdates = {};
            if (email) configUpdates['paj_email'] = email;
            if (password) configUpdates['paj_password'] = password;

            // Save all
            const allUpdates = {};
            Object.keys(updates).forEach(k => {
                allUpdates[`developer/dispatch_dashboard/drivers/${k}`] = updates[k];
            });
            Object.keys(configUpdates).forEach(k => {
                allUpdates[`developer/dispatch_dashboard/master_config/${k}`] = configUpdates[k];
            });

            db.ref().update(allUpdates).then(() => {
                showToast('Settings saved!', 'success');
                closeSettings();
                // If PAJ credentials changed, re-authenticate
                if (email && password) {
                    authenticatePAJ(email, password);
                }
            }).catch(err => showToast('Error saving: ' + err.message, 'error'));
        }

        function openSettings() {
            document.getElementById('settings-modal').classList.add('open');
            updateDriverSettingsUI();
            // Load PAJ config
            db.ref('developer/dispatch_dashboard/master_config').once('value', snap => {
                const config = snap.val() || {};
                if (config.paj_email) document.getElementById('paj-email').value = config.paj_email;
                if (config.paj_password) document.getElementById('paj-password').value = config.paj_password;
            });
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('open');
        }

        // ============================================================
        //  PAJ GPS AUTHENTICATION
        // ============================================================
        async function authenticatePAJ(email, password) {
            try {
                const response = await fetch('https://connect.paj-gps.de/api/v1/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (data.token) {
                    pajToken = data.token;
                    pajTokenExpiry = Date.now() + (data.expires_in || 3600) * 1000;
                    await db.ref('developer/dispatch_dashboard/master_config').update({
                        paj_token: pajToken,
                        token_expiry: pajTokenExpiry
                    });
                    showToast('PAJ GPS Connected!', 'success');
                    startGPSPolling();
                } else {
                    showToast('PAJ Login failed: ' + (data.message || 'Unknown error'), 'error');
                }
            } catch (e) {
                showToast('PAJ Connection error: ' + e.message, 'error');
            }
        }

        function startGPSPolling() {
            if (gpsInterval) clearInterval(gpsInterval);
            fetchDriverLocations();
            gpsInterval = setInterval(fetchDriverLocations, 10000);
        }

        async function fetchDriverLocations() {
            if (!pajToken) return;
            try {
                const response = await fetch('https://connect.paj-gps.de/api/v1/device', {
                    headers: { 'Authorization': 'Bearer ' + pajToken }
                });
                const data = await response.json();
                if (data.devices) {
                    data.devices.forEach(device => {
                        if (device.lastPosition) {
                            const lat = device.lastPosition.lat;
                            const lng = device.lastPosition.lng;
                            const deviceId = device.id || device.deviceId;
                            if (lat && lng && deviceId) {
                                driverLocationCache[deviceId] = {
                                    lat: lat,
                                    lng: lng,
                                    timestamp: device.lastPosition.timestamp || Date.now(),
                                    lastUpdate: Date.now()
                                };
                            }
                        }
                    });
                    updateDriverPositions();
                }
            } catch (e) {
                console.warn('PAJ fetch error:', e);
            }
        }

        function getDriverLocation(driverId) {
            const driver = drivers[driverId];
            if (!driver || !driver.deviceId) return null;
            const cache = driverLocationCache[driver.deviceId];
            if (!cache) return null;
            const age = (Date.now() - cache.lastUpdate) / 1000 / 60;
            return { ...cache, ageMinutes: age };
        }

        // ============================================================
        //  MAP INITIALIZATION
        // ============================================================
        function initMaps() {
            if (!google.maps) return;
            const mapEl = document.getElementById('main-map');
            if (!mapEl) return;

            mainMap = new google.maps.Map(mapEl, {
                center: DEPOT,
                zoom: 11,
                styles: [
                    { featureType: 'all', elementType: 'all', stylers: [{ invert_lightness: true }, { saturation: 10 }, { lightness: 20 }, { gamma: 0.5 }, { hue: '#2a2a4a' }] }
                ],
                gestureHandling: 'greedy'
            });
            mainMapInitialized = true;

            // Init Places autocomplete
            initPlacesAutocomplete();

            // Update driver positions after map is ready
            setTimeout(updateDriverPositions, 500);
        }

        // ============================================================
        //  PLACES AUTOCOMPLETE
        // ============================================================
        function initPlacesAutocomplete() {
            const addressInput = document.getElementById('f-address');
            if (!addressInput || !google.maps) return;
            try {
                autocompleteAddress = new google.maps.places.Autocomplete(addressInput, {
                    componentRestrictions: { country: 'ca' },
                    bounds: new google.maps.Circle({ center: DEPOT, radius: 50000 }).getBounds(),
                    strictBounds: false
                });
                autocompleteAddress.addListener('place_changed', () => {
                    const place = autocompleteAddress.getPlace();
                    if (place.address_components) {
                        for (let comp of place.address_components) {
                            if (comp.types.includes('locality')) {
                                document.getElementById('f-city').value = comp.long_name;
                                break;
                            }
                        }
                    }
                });
            } catch (e) {
                console.warn('Places autocomplete error:', e);
            }
        }

        // ============================================================
        //  DRIVER TABS & CHIPS
        // ============================================================
        function renderDriverTabs() {
            const container = document.getElementById('driver-tabs');
            container.innerHTML = '';
            const ids = Object.keys(drivers);
            if (ids.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding:8px 0;">No drivers configured. Go to Settings.</div>';
                return;
            }
            ids.forEach(id => {
                const d = drivers[id];
                const loc = getDriverLocation(id);
                const isOffline = loc ? loc.ageMinutes > 5 : true;
                const tab = document.createElement('div');
                tab.className = 'driver-tab';
                tab.innerHTML = `
                    <span class="color-dot" style="background:${d.color || '#facc15'}"></span>
                    ${d.name || 'Driver'}
                    <span class="stop-count" id="tab-count-${id}">0</span>
                    ${isOffline ? '<span class="offline-indicator">●</span>' : ''}
                `;
                tab.onclick = () => openDriverModal(id);
                container.appendChild(tab);
            });
        }

        function renderDriverChips() {
            const container = document.getElementById('driver-chips');
            container.innerHTML = '';
            const ids = Object.keys(drivers);
            ids.forEach(id => {
                const d = drivers[id];
                const loc = getDriverLocation(id);
                const chip = document.createElement('div');
                chip.className = 'driver-chip';
                chip.innerHTML = `
                    <span class="dot" style="background:${d.color || '#facc15'}"></span>
                    ${d.name || 'Driver'}
                    ${loc ? '' : ' ⚠️'}
                `;
                chip.onclick = () => zoomToDriver(id);
                container.appendChild(chip);
            });
            if (ids.length > 0) {
                document.getElementById('map-wrapper').classList.add('has-drivers');
            } else {
                document.getElementById('map-wrapper').classList.remove('has-drivers');
            }
        }

        function updateDriverTabCounts() {
            const ids = Object.keys(drivers);
            ids.forEach(id => {
                const count = Object.values(stopsToday).filter(s => s.assignedDriver === id && s.status !== 'completed').length;
                const el = document.getElementById('tab-count-' + id);
                if (el) el.textContent = count;
            });
        }

        // ============================================================
        //  DRIVER POSITION UPDATES (Main Map)
        // ============================================================
        function updateDriverPositions() {
            if (!mainMap || !mainMapInitialized) return;
            const ids = Object.keys(drivers);
            let bounds = new google.maps.LatLngBounds();
            let hasLocation = false;

            // Clear old markers
            Object.values(mainMapMarkers).forEach(m => m.setMap(null));
            mainMapMarkers = {};

            ids.forEach(id => {
                const d = drivers[id];
                const loc = getDriverLocation(id);
                if (loc) {
                    const pos = { lat: loc.lat, lng: loc.lng };
                    const marker = new google.maps.Marker({
                        position: pos,
                        map: mainMap,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 14,
                            fillColor: d.color || '#facc15',
                            fillOpacity: 0.9,
                            strokeColor: '#fff',
                            strokeWeight: 2
                        },
                        label: {
                            text: d.name || '',
                            color: '#fff',
                            fontWeight: 'bold',
                            fontSize: '12px',
                            className: 'driver-label'
                        }
                    });
                    mainMapMarkers[id] = marker;
                    bounds.extend(pos);
                    hasLocation = true;

                    // If offline indicator
                    if (loc.ageMinutes > 5) {
                        // Show offline label above marker
                        const info = new google.maps.InfoWindow({
                            content: `<div style="background:#000;color:#ff6b6b;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;">Last updated ${Math.round(loc.ageMinutes)} min ago</div>`,
                            position: pos
                        });
                        // Store info window reference to close later? We'll manage via timeout.
                        setTimeout(() => info.open(mainMap), 100);
                        setTimeout(() => info.close(), 5000);
                    }
                }
            });

            // Auto-zoom to fit all drivers
            if (hasLocation && !document.getElementById('driver-modal').classList.contains('open')) {
                mainMap.fitBounds(bounds);
            }

            // Update chips
            renderDriverChips();
            updateDriverTabCounts();
        }

        function zoomToDriver(id) {
            const loc = getDriverLocation(id);
            if (!loc) {
                showToast('Driver location not available', 'error');
                return;
            }
            const pos = { lat: loc.lat, lng: loc.lng };
            if (mainMap) {
                mainMap.panTo(pos);
                mainMap.setZoom(15);
            }
        }

        // ============================================================
        //  DRIVER MODAL
        // ============================================================
        function openDriverModal(id) {
            selectedDriverId = id;
            const d = drivers[id];
            if (!d) return;
            document.getElementById('driver-modal-title').textContent = '🚗 ' + (d.name || 'Driver');
            document.getElementById('driver-modal').classList.add('open');

            // Init driver map
            setTimeout(() => {
                const container = document.getElementById('driver-map');
                if (!container) return;
                if (!driverMapInstances[id]) {
                    driverMapInstances[id] = new google.maps.Map(container, {
                        center: DEPOT,
                        zoom: 12,
                        styles: [
                            { featureType: 'all', elementType: 'all', stylers: [{ invert_lightness: true }, { saturation: 10 }, { lightness: 20 }, { gamma: 0.5 }, { hue: '#2a2a4a' }] }
                        ],
                        gestureHandling: 'greedy'
                    });
                }
                const map = driverMapInstances[id];
                google.maps.event.trigger(map, 'resize');

                // Show driver location
                const loc = getDriverLocation(id);
                if (loc) {
                    const pos = { lat: loc.lat, lng: loc.lng };
                    map.setCenter(pos);
                    map.setZoom(14);
                    // Add driver marker
                    if (driverMarkers[id]) driverMarkers[id].setMap(null);
                    driverMarkers[id] = new google.maps.Marker({
                        position: pos,
                        map: map,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 16,
                            fillColor: d.color || '#facc15',
                            fillOpacity: 1,
                            strokeColor: '#fff',
                            strokeWeight: 3
                        },
                        label: {
                            text: d.name || '',
                            color: '#fff',
                            fontWeight: 'bold',
                            fontSize: '14px'
                        }
                    });
                }

                // Draw stops and polyline
                renderDriverMapStops(id);

            }, 200);

            renderDriverStopList(id);
        }

        function closeDriverModal() {
            document.getElementById('driver-modal').classList.remove('open');
            selectedDriverId = null;
            // Clean up markers
            Object.values(allStopsMarkers).forEach(m => m.setMap(null));
            allStopsMarkers = {};
        }

        function renderDriverMapStops(driverId) {
            const map = driverMapInstances[driverId];
            if (!map) return;

            // Clear old markers
            Object.values(allStopsMarkers).forEach(m => m.setMap(null));
            allStopsMarkers = {};

            // Get assigned stops (pending only)
            const assigned = Object.entries(stopsToday)
                .filter(([id, s]) => s.assignedDriver === driverId && s.status !== 'completed')
                .sort((a, b) => (a[1].order || 0) - (b[1].order || 0));

            if (assigned.length === 0) {
                // Clear polyline
                if (driverPolylines[driverId]) {
                    driverPolylines[driverId].setMap(null);
                    delete driverPolylines[driverId];
                }
                return;
            }

            // Build polyline path
            const path = [];
            const d = drivers[driverId];
            const loc = getDriverLocation(driverId);

            // Start from driver location if available
            if (loc) {
                path.push({ lat: loc.lat, lng: loc.lng });
            } else {
                path.push(DEPOT);
            }

            assigned.forEach(([id, stop]) => {
                // Geocode stop address (use cached or approximate)
                const pos = getStopPosition(stop);
                if (pos) {
                    path.push(pos);
                    // Add marker
                    const marker = new google.maps.Marker({
                        position: pos,
                        map: map,
                        label: {
                            text: stop.name || 'Stop',
                            color: '#fff',
                            fontWeight: 'bold',
                            fontSize: '11px'
                        },
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 10,
                            fillColor: d.color || '#facc15',
                            fillOpacity: 0.8,
                            strokeColor: '#fff',
                            strokeWeight: 2
                        }
                    });
                    allStopsMarkers[id] = marker;
                }
            });

            // Draw polyline
            if (driverPolylines[driverId]) {
                driverPolylines[driverId].setMap(null);
            }
            if (path.length > 1) {
                driverPolylines[driverId] = new google.maps.Polyline({
                    path: path,
                    geodesic: true,
                    strokeColor: d.color || '#facc15',
                    strokeOpacity: 0.8,
                    strokeWeight: 4,
                    map: map
                });

                // Fit bounds
                const bounds = new google.maps.LatLngBounds();
                path.forEach(p => bounds.extend(p));
                map.fitBounds(bounds);
            }
        }

        function getStopPosition(stop) {
            // Try to geocode the address for real position
            // For simplicity, return a random-ish position near depot if not cached
            // In production, you'd geocode properly.
            if (stop._lat && stop._lng) return { lat: stop._lat, lng: stop._lng };
            // For demo, return a position based on hash of address
            const hash = stop.address ? stop.address.length : 0;
            return {
                lat: DEPOT.lat + (hash % 10) * 0.02 - 0.1,
                lng: DEPOT.lng + (hash % 8) * 0.02 - 0.08
            };
        }

        function renderDriverStopList(driverId) {
            const container = document.getElementById('driver-stop-list');
            if (!container) return;
            const assigned = Object.entries(stopsToday)
                .filter(([id, s]) => s.assignedDriver === driverId)
                .sort((a, b) => (a[1].order || 0) - (b[1].order || 0));

            if (assigned.length === 0) {
                container.innerHTML = '<div class="empty-state">No stops assigned to this driver.</div>';
                return;
            }

            let html = '';
            assigned.forEach(([id, stop]) => {
                const isCompleted = stop.status === 'completed';
                const timeStr = stop.completedAt ? new Date(stop.completedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                html += `
                    <div class="stop-item ${isCompleted ? 'completed' : ''}" data-id="${id}">
                        <div class="stop-info">
                            <div class="stop-name">${stop.name || 'No name'}</div>
                            <div class="stop-address">${stop.address || ''}, ${stop.city || ''}</div>
                        </div>
                        <div class="stop-status">
                            ${isCompleted ? '✓ Done' : 'Pending'}
                            ${timeStr ? `<span class="completion-time">${timeStr}</span>` : ''}
                        </div>
                        <div class="stop-actions">
                            <button onclick="toggleStopComplete('${id}')" title="Toggle complete">
                                ${isCompleted ? '↩️' : '✅'}
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ============================================================
        //  STOP MANAGEMENT
        // ============================================================
        function addStop() {
            const name = document.getElementById('f-name').value.trim();
            const address = document.getElementById('f-address').value.trim();
            const city = document.getElementById('f-city').value.trim();
            if (!name || !address || !city) {
                showToast('Please fill all fields', 'error');
                return;
            }

            const newStop = {
                name: name,
                address: address,
                city: city,
                assignedDriver: null,
                status: 'pending',
                completedAt: null,
                order: Object.keys(stopsToday).length,
                createdAt: Date.now(),
                createdBy: currentUser
            };

            const ref = db.ref('developer/dispatch_dashboard/stops_today').push();
            ref.set(newStop).then(() => {
                document.getElementById('f-name').value = '';
                document.getElementById('f-address').value = '';
                document.getElementById('f-city').value = '';
                showToast('Stop added!', 'success');
                // Update address lookup
                const key = name.replace(/[.#$\[\]\/]/g, '').trim();
                if (key) {
                    db.ref('address_lookup').child(key).set({ address, city, last_edit_by: currentUser });
                }
            }).catch(err => showToast('Error: ' + err.message, 'error'));
        }

        function updateStopOrder() {
            const ids = Object.keys(stopsToday);
            stopOrder = ids.sort((a, b) => (stopsToday[a].order || 0) - (stopsToday[b].order || 0));
        }

        function updateStopList() {
            const container = document.getElementById('stop-list');
            if (!container) return;
            const ids = Object.keys(stopsToday);
            if (ids.length === 0) {
                container.innerHTML = '<div class="empty-state">No stops yet. Add a stop above.</div>';
                if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
                return;
            }

            // Sort by order
            const sorted = ids.sort((a, b) => (stopsToday[a].order || 0) - (stopsToday[b].order || 0));

            let html = '';
            sorted.forEach(id => {
                const stop = stopsToday[id];
                if (!stop) return;
                const isCompleted = stop.status === 'completed';
                const timeStr = stop.completedAt ? new Date(stop.completedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                const driverName = stop.assignedDriver ? (drivers[stop.assignedDriver]?.name || 'Unknown') : 'Unassigned';
                const driverColor = stop.assignedDriver ? (drivers[stop.assignedDriver]?.color || '#666') : '#666';

                // Check for proximity hint (if assignedDriver is null and we have a suggestion)
                const hasProximity = stop._proximityHint || false;

                html += `
                    <div class="stop-item ${isCompleted ? 'completed' : ''} ${hasProximity ? 'proximity-hint' : ''}" data-id="${id}">
                        <div class="stop-info" style="flex:1;">
                            <div class="stop-name">${stop.name || 'No name'}</div>
                            <div class="stop-address">${stop.address || ''}, ${stop.city || ''}</div>
                        </div>
                        <select class="stop-assign" data-id="${id}" style="background:${stop.assignedDriver ? driverColor : 'var(--input-bg)'}; color:${stop.assignedDriver ? '#fff' : 'var(--text-muted)'};">
                            <option value="">Unassigned</option>
                            ${Object.keys(drivers).map(did => `<option value="${did}" ${stop.assignedDriver === did ? 'selected' : ''}>${drivers[did].name}</option>`).join('')}
                        </select>
                        <div class="stop-status">
                            ${isCompleted ? '✓ Done' : 'Pending'}
                            ${timeStr ? `<span class="completion-time">${timeStr}</span>` : ''}
                        </div>
                        <div class="stop-actions">
                            ${!isCompleted ? `<button class="next-btn" onclick="moveToTomorrow('${id}')" title="Move to tomorrow">→</button>` : ''}
                            <button onclick="toggleStopComplete('${id}')" title="Toggle complete">
                                ${isCompleted ? '↩️' : '✅'}
                            </button>
                            <button onclick="deleteStop('${id}')" title="Delete" style="color:var(--red);">✕</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            // Attach change events to assignment dropdowns
            container.querySelectorAll('.stop-assign').forEach(sel => {
                sel.addEventListener('change', function() {
                    const id = this.dataset.id;
                    const val = this.value || null;
                    assignDriver(id, val);
                });
            });

            // Re-init Sortable
            initSortable();
            updateStopCount();
            updateDriverTabCounts();
        }

        function initSortable() {
            const container = document.getElementById('stop-list');
            if (sortableInstance) {
                sortableInstance.destroy();
                sortableInstance = null;
            }
            if (!container || container.querySelectorAll('.stop-item').length === 0) return;
            sortableInstance = new Sortable(container, {
                animation: 150,
                delay: 200,
                delayOnTouchOnly: true,
                draggable: '.stop-item',
                ghostClass: 'sortable-ghost',
                onEnd: function(evt) {
                    const items = container.querySelectorAll('.stop-item');
                    const updates = {};
                    items.forEach((el, idx) => {
                        const id = el.dataset.id;
                        if (id) {
                            updates[`${id}/order`] = idx;
                        }
                    });
                    db.ref('developer/dispatch_dashboard/stops_today').update(updates);
                }
            });
        }

        function updateStopCount() {
            const total = Object.keys(stopsToday).filter(id => stopsToday[id].status !== 'completed').length;
            document.getElementById('stop-count').textContent = `(${total} pending)`;
        }

        // ============================================================
        //  STOP ACTIONS
        // ============================================================
        function assignDriver(stopId, driverId) {
            db.ref(`developer/dispatch_dashboard/stops_today/${stopId}/assignedDriver`).set(driverId || null)
                .then(() => {
                    if (driverId) {
                        showToast(`Assigned to ${drivers[driverId]?.name || 'driver'}`, 'success');
                    }
                });
        }

        function toggleStopComplete(id) {
            const stop = stopsToday[id];
            if (!stop) return;
            const newStatus = stop.status === 'completed' ? 'pending' : 'completed';
            const updates = {
                [`${id}/status`]: newStatus,
                [`${id}/completedAt`]: newStatus === 'completed' ? Date.now() : null
            };
            db.ref('developer/dispatch_dashboard/stops_today').update(updates)
                .then(() => {
                    if (newStatus === 'completed') {
                        showToast('✅ Stop completed!', 'success');
                    } else {
                        showToast('↩️ Re-opened', 'success');
                    }
                });
        }

        function deleteStop(id) {
            if (!confirm('Delete this stop?')) return;
            db.ref(`developer/dispatch_dashboard/stops_today/${id}`).remove();
        }

        function clearAllStops() {
            if (!confirm('Delete ALL stops for today?')) return;
            db.ref('developer/dispatch_dashboard/stops_today').remove();
            showToast('All stops cleared', 'success');
        }

        function clearCompletedStops() {
            const completed = Object.keys(stopsToday).filter(id => stopsToday[id].status === 'completed');
            if (completed.length === 0) {
                showToast('No completed stops to clear', 'error');
                return;
            }
            if (!confirm(`Clear ${completed.length} completed stops?`)) return;
            const updates = {};
            completed.forEach(id => { updates[id] = null; });
            db.ref('developer/dispatch_dashboard/stops_today').update(updates);
            showToast(`Cleared ${completed.length} completed stops`, 'success');
        }

        // ============================================================
        //  NEXT DAY / TOMORROW
        // ============================================================
        function showNextDayPrompt() {
            const pending = Object.keys(stopsToday).filter(id => stopsToday[id].status !== 'completed');
            if (pending.length === 0) {
                showToast('No pending stops to move to tomorrow', 'error');
                return;
            }
            if (!confirm(`Move ${pending.length} pending stops to tomorrow's list?`)) return;
            movePendingToTomorrow();
        }

        function movePendingToTomorrow() {
            const pending = Object.keys(stopsToday).filter(id => stopsToday[id].status !== 'completed');
            if (pending.length === 0) return;

            const updates = {};
            pending.forEach(id => {
                const stop = stopsToday[id];
                // Copy to tomorrow
                const newRef = db.ref('developer/dispatch_dashboard/stops_tomorrow').push();
                const copy = { ...stop, order: null, createdAt: Date.now() };
                updates[`stops_tomorrow/${newRef.key}`] = copy;
                // Remove from today
                updates[`stops_today/${id}`] = null;
            });

            db.ref('developer/dispatch_dashboard').update(updates)
                .then(() => {
                    showToast(`Moved ${pending.length} stops to tomorrow`, 'success');
                });
        }

        function moveToTomorrow(id) {
            const stop = stopsToday[id];
            if (!stop) return;
            if (stop.status === 'completed') {
                showToast('Cannot move completed stops', 'error');
                return;
            }
            if (!confirm(`Move "${stop.name}" to tomorrow?`)) return;

            const copy = { ...stop, order: null, createdAt: Date.now() };
            const newRef = db.ref('developer/dispatch_dashboard/stops_tomorrow').push();
            const updates = {};
            updates[`stops_tomorrow/${newRef.key}`] = copy;
            updates[`stops_today/${id}`] = null;
            db.ref('developer/dispatch_dashboard').update(updates)
                .then(() => showToast(`Moved "${stop.name}" to tomorrow`, 'success'));
        }

        // ============================================================
        //  TOAST
        // ============================================================
        function showToast(msg, type = 'info') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type;
            el.classList.add('show');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.remove('show'), 4000);
        }

        // ============================================================
        //  KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement.closest('.add-stop-form')) {
                addStop();
            }
            if (e.key === 'Escape') {
                if (document.getElementById('driver-modal').classList.contains('open')) {
                    closeDriverModal();
                }
                if (document.getElementById('settings-modal').classList.contains('open')) {
                    closeSettings();
                }
            }
        });

        // ============================================================
        //  BOOT
        // ============================================================
        console.log('🚚 Dispatch Dashboard initialized');
        console.log('📌 PAJ GPS Integration: https://connect.paj-gps.de/api/v1');
        console.log('📌 Firebase path: developer/dispatch_dashboard/');

        // Expose functions globally for onclick
        window.attemptLogin = attemptLogin;
        window.addStop = addStop;
        window.deleteStop = deleteStop;
        window.toggleStopComplete = toggleStopComplete;
        window.assignDriver = assignDriver;
        window.clearAllStops = clearAllStops;
        window.clearCompletedStops = clearCompletedStops;
        window.openDriverModal = openDriverModal;
        window.closeDriverModal = closeDriverModal;
        window.zoomToDriver = zoomToDriver;
        window.openSettings = openSettings;
        window.closeSettings = closeSettings;
        window.saveSettings = saveSettings;
        window.addDriverSetting = addDriverSetting;
        window.removeDriver = removeDriver;
        window.moveToTomorrow = moveToTomorrow;
        window.showNextDayPrompt = showNextDayPrompt;
        window.initMaps = initMaps;
    </script>
</body>
</html>

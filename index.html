        }

        function buildAndSendEmail(dateStr) {
            const savedRoutesRef = db.ref('developer/route_planner/saved_routes');
            savedRoutesRef.once('value').then(snap => {
                const savedData = snap.val() || {};
                let bodyParts = [];
                const keys = Object.keys(savedData);
                keys.forEach(key => {
                    const route = savedData[key];
                    const label = route.label || 'Unnamed';
                    const stops = route.stops || [];
                    if (stops.length === 0) return;
                    const etaMinutes = route.etaTotalMinutes || 0;
                    const etaKm = route.etaTotalKm || 0;
                    const content = buildRouteBody(label, stops, etaMinutes, etaKm, dateStr);
                    bodyParts.push(content);
                });
                if (optimizedOrder && optimizedOrder.length > 0) {
                    const currentStops = [];
                    optimizedOrder.forEach(id => {
                        const job = jobs[id];
                        if (job) {
                            currentStops.push({
                                name: job.name,
                                city: job.city,
                                box_qty: job.box_qty || 0,
                                piece_qty: job.piece_qty || 0,
                                envelope_qty: job.envelope_qty || 0,
                                skid_qty: job.skid_qty || 0,
                                weight_lbs: job.weight_lbs || 0,
                                other_details: job.other_details || ''
                            });
                        }
                    });
                    if (currentStops.length > 0) {
                        const content = buildRouteBody('Current Route', currentStops, etaTotalMinutes, etaTotalKm, dateStr);
                        bodyParts.push(content);
                    }
                }
                if (bodyParts.length === 0) {
                    alert("No routes to share.");
                    return;
                }
                const emailBody = bodyParts.join('\n\n');
                const subject = `Route Manifest for ${dateStr}`;
                const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;
                window.location.href = mailtoLink;
            }).catch(err => alert("Error loading saved routes: " + err.message));
        }

        // ---------- MAP MODAL FUNCTIONS ----------
        function openMap() {
            document.getElementById('map-modal').style.display = 'block';
            setTimeout(() => {
                google.maps.event.trigger(map, 'resize');
                if (optimizedOrder.length > 0 && activePolyline) {
                    const bounds = new google.maps.LatLngBounds();
                    activePolyline.getPath().forEach(p => bounds.extend(p));
                    map.fitBounds(bounds);
                } else {
                    map.setCenter({ lat: 49.8425, lng: -99.9497 });
                    map.setZoom(12);
                }
            }, 100);
        }

        function closeMap() {
            document.getElementById('map-modal').style.display = 'none';
        }

        function zoomToAll() {
            if (activePolyline) {
                const bounds = new google.maps.LatLngBounds();
                activePolyline.getPath().forEach(p => bounds.extend(p));
                map.fitBounds(bounds);
            }
        }

        function resetMapView() {
            zoomToAll();
        }

        // ---------- EXTERNAL ROUTE ----------
        function openExternalRoute() {
            if (optimizedOrder.length === 0) {
                alert("No stops to route.");
                return;
            }
            const origin = "1604 Moreland Ave, Brandon MB";
            const destination = "1604 Moreland Ave, Brandon MB";
            const seenLocs = new Set();
            const maxStopsForExternal = 25;
            let stopsAdded = 0;
            const waypoints = optimizedOrder.map(id => {
                if (stopsAdded >= maxStopsForExternal) return "";
                const job = jobs[id];
                if (!job) return "";
                const addr = job.pickup_location;
                const city = job.city || "Brandon";
                const key = `${addr}, ${city}`;
                if (seenLocs.has(key)) return "";
                seenLocs.add(key);
                stopsAdded++;
                return encodeURIComponent(key);
            }).filter(w => w !== "").join("|");

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/android/i.test(userAgent)) {
                window.location.href = `intent://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving#Intent;scheme=https;package=com.google.android.apps.maps;end`;
            } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = `comgooglemaps://?saddr=${encodeURIComponent(origin)}&daddr=${encodeURIComponent(destination)}&waypoints=${waypoints}&directionsmode=driving`;
            } else {
                window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&waypoints=${waypoints}&travelmode=driving`, '_blank');
            }
        }

        // ---------- PWA INSTALL ----------
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });
        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') deferredPrompt = null;
                document.getElementById('install-btn').style.display = 'none';
            }
        });

        // ========== ADDRESS PICKER FUNCTIONS ==========
        let pickerMap = null;
        let pickerMarker = null;
        let pickerGeocoder = null;
        let pickerAutocomplete = null;
        let pickerInitialized = false;
        let selectedLocation = null;

        function initAddressPickerMap() {
            if (pickerInitialized) return;
            const container = document.getElementById('picker-map');
            if (!container) return;
            if (!google.maps) return;
            const defaultCenter = { lat: 49.8425, lng: -99.9497 };
            pickerMap = new google.maps.Map(container, {
                center: defaultCenter,
                zoom: 12,
                mapTypeId: 'roadmap',
                styles: mapStyles,
                gestureHandling: 'greedy'
            });
            pickerGeocoder = new google.maps.Geocoder();
            pickerMarker = new google.maps.Marker({
                position: defaultCenter,
                map: pickerMap,
                draggable: true,
                animation: google.maps.Animation.DROP,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: '#ff9800',
                    fillOpacity: 1,
                    strokeColor: '#ffffff',
                    strokeWeight: 2
                }
            });
            pickerMarker.addListener('dragend', function() {
                const pos = pickerMarker.getPosition();
                updatePickerInfo(pos.lat(), pos.lng());
            });
            pickerMap.addListener('click', function(e) {
                const lat = e.latLng.lat();
                const lng = e.latLng.lng();
                pickerMarker.setPosition({ lat, lng });
                updatePickerInfo(lat, lng);
            });
            const searchInput = document.getElementById('picker-search');
            if (searchInput) {
                pickerAutocomplete = new google.maps.places.Autocomplete(searchInput, {
                    types: ['geocode'],
                    componentRestrictions: { country: 'ca' }
                });
                pickerAutocomplete.addListener('place_changed', function() {
                    const place = pickerAutocomplete.getPlace();
                    if (!place.geometry) return;
                    const location = place.geometry.location;
                    const lat = location.lat();
                    const lng = location.lng();
                    pickerMap.panTo({ lat, lng });
                    pickerMap.setZoom(14);
                    pickerMarker.setPosition({ lat, lng });
                    updatePickerInfo(lat, lng);
                });
            }
            updatePickerInfo(defaultCenter.lat, defaultCenter.lng);
            pickerInitialized = true;
        }

        function openAddressPicker() {
            const modal = document.getElementById('address-picker-modal');
            modal.style.display = 'block';
            if (!pickerInitialized) {
                initAddressPickerMap();
            }
            setTimeout(() => {
                if (pickerMap) {
                    google.maps.event.trigger(pickerMap, 'resize');
                    const pos = pickerMarker.getPosition();
                    if (pos) {
                        pickerMap.setCenter(pos);
                    }
                }
            }, 100);
            document.getElementById('picker-search').value = '';
            if (pickerMarker) {
                const pos = pickerMarker.getPosition();
                if (pos) {
                    updatePickerInfo(pos.lat(), pos.lng());
                }
            }
        }

        function closeAddressPicker() {
            document.getElementById('address-picker-modal').style.display = 'none';
        }

        function updatePickerInfo(lat, lng) {
            const latLng = { lat, lng };
            pickerGeocoder.geocode({ location: latLng }, function(results, status) {
                let address = '';
                let plusCode = '';
                if (status === 'OK' && results.length > 0) {
                    address = results[0].formatted_address || '';
                    for (let result of results) {
                        if (result.types && result.types.includes('plus_code')) {
                            plusCode = result.formatted_address || '';
                            break;
                        }
                        if (result.plus_code) {
                            plusCode = result.plus_code.compound_code || result.plus_code.global_code || '';
                        }
                    }
                } else {
                    address = `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
                }
                if (!plusCode) {
                    for (let result of results) {
                        if (result.address_components) {
                            for (let comp of result.address_components) {
                                if (comp.types && comp.types.includes('plus_code')) {
                                    plusCode = comp.long_name || comp.short_name || '';
                                    break;
                                }
                            }
                        }
                        if (plusCode) break;
                    }
                }
                selectedLocation = {
                    lat: lat,
                    lng: lng,
                    address: address,
                    plusCode: plusCode || ''
                };
                document.getElementById('picker-address-display').textContent = address || 'Address not found';
                document.getElementById('picker-pluscode-display').textContent = plusCode ? `Plus Code: ${plusCode}` : 'Plus Code: —';
            });
        }

        function searchAddressPicker() {
            const input = document.getElementById('picker-search');
            const query = input.value.trim();
            if (!query) return;
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ address: query, region: 'ca' }, function(results, status) {
                if (status === 'OK' && results.length > 0) {
                    const location = results[0].geometry.location;
                    const lat = location.lat();
                    const lng = location.lng();
                    pickerMap.panTo({ lat, lng });
                    pickerMap.setZoom(14);
                    pickerMarker.setPosition({ lat, lng });
                    updatePickerInfo(lat, lng);
                } else {
                    alert('Location not found.');
                }
            });
        }

        function confirmAddress() {
            if (!selectedLocation) {
                alert("No location selected.");
                return;
            }
            let addressToUse = selectedLocation.address || selectedLocation.plusCode;
            if (!addressToUse) {
                alert("Could not determine address.");
                return;
            }
            document.getElementById('f-address').value = addressToUse;
            closeAddressPicker();
        }
    </script>
</body>
</html>
